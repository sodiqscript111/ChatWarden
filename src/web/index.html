<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Moderator Realtime // V.2.0</title>
    <style>
        :root {
            --bg-color: #050505;
            --term-green: #00ff41;
            --term-red: #ff0055;
            --term-dim: #003b00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color);
            color: var(--term-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 800px;
            height: 600px;
            background: #000;
            border: 2px solid var(--term-green);
            box-shadow: 0 0 20px var(--term-green);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 10px 20px;
            border-bottom: 2px solid var(--term-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: var(--term-dim);
        }

        .status-light {
            width: 10px;
            height: 10px;
            background-color: #333;
            border-radius: 50%;
        }

        .status-light.connected {
            background-color: var(--term-green);
            box-shadow: 0 0 10px var(--term-green);
            animation: pulse 2s infinite;
        }

        .status-light.disconnected {
            background-color: var(--term-red);
            box-shadow: 0 0 10px var(--term-red);
        }

        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-left: 3px solid var(--term-green);
            background: var(--glass);
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        .message.own {
            align-self: flex-end;
            border-left: none;
            border-right: 3px solid #00f0ff;
            color: #00f0ff;
        }

        .message.system {
            align-self: center;
            border: 1px solid var(--term-red);
            color: var(--term-red);
            text-align: center;
            box-shadow: inset 0 0 10px rgba(255, 0, 85, 0.3);
            width: 90%;
        }

        .uid {
            font-size: 0.7em;
            opacity: 0.7;
            margin-bottom: 5px;
            display: block;
        }

        .input-area {
            padding: 20px;
            border-top: 2px solid var(--term-green);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: transparent;
            border: 1px solid var(--term-green);
            color: var(--term-green);
            padding: 10px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 10px var(--term-green);
        }

        button {
            background: var(--term-green);
            color: #000;
            border: none;
            padding: 10px 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-family: inherit;
            transition: all 0.2s;
        }

        button:hover {
            box-shadow: 0 0 15px var(--term-green);
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--term-green);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <span>Secure Channel // Mod_System_Active</span>
            <div id="status" class="status-light disconnected"></div>
        </div>
        <div id="chat-window">
        </div>
        <div class="input-area">
            <span style="align-self: center;">></span>
            <input type="text" id="msgInput" placeholder="Enter message..." autocomplete="off">
            <button onclick="send()">SEND</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const msgInput = document.getElementById('msgInput');
        const statusLight = document.getElementById('status');

        const userId = 'user_' + Math.random().toString(36).substr(2, 5);
        console.log("My ID:", userId);

        let ws = null;

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/${userId}`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log("Connected");
                statusLight.className = "status-light connected";
                addSystemMessage("SYSTEM CONNECTED.");
            };

            ws.onmessage = (event) => {
                const payload = JSON.parse(event.data);

                if (payload.type === 'chat') {
                    if (payload.user_id === userId) {
                        addMessage(payload.text, 'own', payload.user_id);
                    } else {
                        addMessage(payload.text, 'other', payload.user_id);
                    }
                }
                else if (payload.type === 'history') {
                    payload.data.forEach(msg => {
                        const type = msg.user_id === userId ? 'own' : 'other';
                        addMessage(msg.text, type, msg.user_id);
                    });
                    addSystemMessage("-------- HISTORY LOADED --------");
                }
                else if (payload.type === 'system') {
                    addSystemMessage(payload.reason || "System Message");
                }
            };

            ws.onclose = (event) => {
                console.log("Disconnected", event);
                statusLight.className = "status-light disconnected";
                if (event.code === 4003) {
                    addSystemMessage(`[CRITICAL] BANNED: ${event.reason}`);
                } else {
                    addSystemMessage("CONNECTION LOST. RECONNECTING...");
                    setTimeout(connect, 3000);
                }
            };

            ws.onerror = (error) => {
                console.error("WS Error", error);
            };
        }

        connect();

        msgInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                send();
            }
        });

        function send() {
            const text = msgInput.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

            ws.send(JSON.stringify({ text: text }));
            msgInput.value = '';
        }

        function addMessage(text, type, uid) {
            const div = document.createElement('div');
            div.className = `message ${type}`;

            const uidSpan = document.createElement('span');
            uidSpan.className = 'uid';
            uidSpan.textContent = uid;

            const textSpan = document.createElement('span');
            textSpan.textContent = text;

            div.appendChild(uidSpan);
            div.appendChild(textSpan);

            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = `message system`;
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>

</html>
